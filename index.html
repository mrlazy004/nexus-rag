<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus RAG — Enterprise Knowledge Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f14;--bg2:#14161d;--bg3:#1c1f29;--bg4:#232738;
    --border:#2a2f40;--border2:#3a4055;
    --text:#e8eaf0;--text2:#9aa0b8;--text3:#6b7290;
    --accent:#4f7fff;--accent2:#3a63d4;--accent-glow:rgba(79,127,255,.15);
    --green:#2dd97a;--red:#f05252;--amber:#f5a623;
    --radius:12px;--radius-sm:8px;
    --font-sans:'Inter',sans-serif;
    --font-serif:'DM Serif Display',serif;
    --font-mono:'DM Mono',monospace;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  
  /* ── Layout ── */
  .shell{display:flex;height:100vh;overflow:hidden}
  
  /* ── Sidebar ── */
  .sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
  .sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#fff;flex-shrink:0}
  .logo-name{font-family:var(--font-serif);font-size:18px;color:var(--text)}
  .logo-sub{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
  
  .sidebar-section{padding:12px 14px 6px}
  .section-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:500;margin-bottom:8px}
  
  .new-chat-btn{width:100%;padding:9px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
  .new-chat-btn:hover{background:var(--accent2)}
  
  .doc-list{flex:1;overflow-y:auto;padding:8px 14px}
  .doc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;margin-bottom:2px}
  .doc-item:hover{background:var(--bg3)}
  .doc-icon{font-size:14px;flex-shrink:0}
  .doc-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .doc-chunks{font-size:10px;color:var(--text3);flex-shrink:0}
  .doc-del{font-size:11px;color:var(--text3);cursor:pointer;opacity:0;transition:opacity .15s}
  .doc-item:hover .doc-del{opacity:1}
  .doc-del:hover{color:var(--red)}
  
  .sidebar-footer{padding:14px;border-top:1px solid var(--border)}
  .metrics-row{display:flex;gap:8px}
  .metric-pill{flex:1;background:var(--bg3);border-radius:6px;padding:6px 8px;text-align:center}
  .metric-val{font-size:14px;font-weight:600;color:var(--text);font-family:var(--font-mono)}
  .metric-lbl{font-size:9px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
  
  /* ── Upload area ── */
  .upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;background:transparent}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-glow)}
  .upload-zone input{display:none}
  .upload-icon{font-size:20px;margin-bottom:4px;display:block}
  .upload-text{font-size:11px;color:var(--text2)}
  .upload-sub{font-size:10px;color:var(--text3);margin-top:2px}
  
  /* ── Main chat area ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .chat-topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
  .chat-title{font-family:var(--font-serif);font-size:18px;color:var(--text)}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .session-badge{font-size:10px;color:var(--text3);background:var(--bg3);padding:4px 8px;border-radius:20px;font-family:var(--font-mono)}
  .clear-btn{font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s}
  .clear-btn:hover{border-color:var(--border2);color:var(--text2)}
  
  /* ── Messages ── */
  .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-track{background:transparent}
  .messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  
  .msg{display:flex;gap:12px;max-width:820px;width:100%;animation:fadeUp .25s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  
  .avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:600}
  .avatar.ai{background:var(--accent);color:#fff}
  .avatar.user{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
  
  .bubble{flex:1;min-width:0}
  .bubble-user{background:var(--bg4);border:1px solid var(--border2);border-radius:12px 4px 12px 12px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:560px;margin-left:auto}
  .bubble-ai{background:var(--bg2);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:14px 18px;font-size:14px;line-height:1.7}
  
  .ai-text p{margin-bottom:10px}
  .ai-text p:last-child{margin-bottom:0}
  .ai-text ul,.ai-text ol{padding-left:20px;margin-bottom:10px}
  .ai-text li{margin-bottom:4px}
  .ai-text strong{color:var(--text);font-weight:600}
  .ai-text code{font-family:var(--font-mono);font-size:12px;background:var(--bg3);padding:2px 5px;border-radius:4px;color:#a8c0ff}
  
  /* Citations */
  .citations{margin-top:12px;display:flex;flex-direction:column;gap:4px}
  .citations-header{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;font-weight:500}
  .citation{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;transition:border-color .15s}
  .citation:hover{border-color:var(--accent)}
  .citation-top{display:flex;align-items:center;gap:8px}
  .citation-num{width:18px;height:18px;background:var(--accent);border-radius:4px;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
  .citation-file{font-size:12px;color:var(--text2);font-weight:500;flex:1}
  .citation-loc{font-size:10px;color:var(--text3);font-family:var(--font-mono)}
  .citation-score{font-size:10px;color:var(--green);font-family:var(--font-mono);flex-shrink:0}
  .citation-excerpt{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;display:none}
  .citation.expanded .citation-excerpt{display:block}
  
  /* Feedback */
  .msg-footer{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .feedback-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
  .feedback-btn:hover{border-color:var(--border2);color:var(--text2)}
  .feedback-btn.active-up{border-color:var(--green);color:var(--green);background:rgba(45,217,122,.08)}
  .feedback-btn.active-down{border-color:var(--red);color:var(--red);background:rgba(240,82,82,.08)}
  .latency{font-size:10px;color:var(--text3);margin-left:auto;font-family:var(--font-mono)}
  
  /* Typing indicator */
  .typing{display:flex;gap:5px;align-items:center;padding:4px 0}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce .9s infinite}
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  
  /* Welcome */
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px;color:var(--text3)}
  .welcome-logo{font-family:var(--font-serif);font-size:36px;color:var(--text);margin-bottom:8px}
  .welcome-sub{font-size:14px;margin-bottom:32px;max-width:400px;line-height:1.6}
  .suggestion-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;width:100%}
  .suggestion{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;text-align:left;transition:all .15s;font-size:13px;color:var(--text2);line-height:1.4}
  .suggestion:hover{border-color:var(--accent);background:var(--accent-glow);color:var(--text)}
  
  /* Input area */
  .input-area{padding:16px 24px 20px;border-top:1px solid var(--border);background:var(--bg2)}
  .input-wrapper{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;display:flex;align-items:flex-end;gap:8px;padding:12px 14px;transition:border-color .2s}
  .input-wrapper:focus-within{border-color:var(--accent)}
  .input-wrapper textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.5;resize:none;max-height:120px;min-height:22px}
  .input-wrapper textarea::placeholder{color:var(--text3)}
  .send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;opacity:.4}
  .send-btn:not(:disabled){opacity:1}
  .send-btn:not(:disabled):hover{background:var(--accent2)}
  .send-btn:disabled{cursor:not-allowed}
  .send-icon{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  
  /* Toast */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 18px;font-size:13px;color:var(--text);animation:fadeUp .2s ease;z-index:100;pointer-events:none}
  .toast.error{border-color:var(--red);color:var(--red)}
  
  /* Upload progress */
  .upload-progress{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;margin-top:4px}
  .progress-bar-bg{background:var(--bg4);border-radius:4px;height:4px;overflow:hidden;margin-top:4px}
  .progress-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease;animation:shimmer 1.2s infinite}
  @keyframes shimmer{0%{opacity:.7}50%{opacity:1}100%{opacity:.7}}
  
  /* Scrollbar */
  .doc-list::-webkit-scrollbar{width:3px}
  .doc-list::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>
<div class="shell">
  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">N</div>
        <div>
          <div class="logo-name">Nexus RAG</div>
          <div class="logo-sub">Knowledge Assistant</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Conversations</div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        New Conversation
      </button>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Documents</div>
      <label class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf,.xlsx,.xls,.csv,.txt,.md,.docx" multiple onchange="handleFiles(this.files)"/>
        <span class="upload-icon">📂</span>
        <div class="upload-text">Drop files or click to upload</div>
        <div class="upload-sub">PDF · Excel · CSV · TXT · DOCX</div>
      </label>
      <div id="uploadStatus"></div>
    </div>

    <div class="doc-list" id="docList">
      <!-- populated by JS -->
    </div>

    <div class="sidebar-footer">
      <div class="metrics-row">
        <div class="metric-pill">
          <div class="metric-val" id="m-queries">0</div>
          <div class="metric-lbl">Queries</div>
        </div>
        <div class="metric-pill">
          <div class="metric-val" id="m-thumbsup">—</div>
          <div class="metric-lbl">Positive</div>
        </div>
        <div class="metric-pill">
          <div class="metric-val" id="m-latency">—</div>
          <div class="metric-lbl">Avg ms</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="main">
    <div class="chat-topbar">
      <div class="chat-title">Ask your documents</div>
      <div class="topbar-right">
        <span class="session-badge" id="sessionBadge">session: —</span>
        <button class="clear-btn" onclick="clearHistory()">Clear history</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-logo">Nexus RAG</div>
        <div class="welcome-sub">Upload business documents and ask natural-language questions. Every answer cites its source.</div>
        <div class="suggestion-grid">
          <button class="suggestion" onclick="useSuggestion(this)">What were our Q3 revenue figures?</button>
          <button class="suggestion" onclick="useSuggestion(this)">Summarise the employee leave policy</button>
          <button class="suggestion" onclick="useSuggestion(this)">Which products had the highest margin?</button>
          <button class="suggestion" onclick="useSuggestion(this)">List the key findings from the report</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="questionInput" placeholder="Ask a business question…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg class="send-icon" viewBox="0 0 16 16">
            <line x1="3" y1="8" x2="13" y2="8"/>
            <polyline points="9,4 13,8 9,12"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const API = 'http://localhost:8000';
let SESSION_ID = localStorage.getItem('rag_session') || generateId();
localStorage.setItem('rag_session', SESSION_ID);

let documents = [];
let isLoading = false;
let feedbackState = {}; // messageId → rating

// ─── Session ─────────────────────────────────────────────────────────────────
function generateId() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

document.getElementById('sessionBadge').textContent = 'session: ' + SESSION_ID.slice(0,8);
document.getElementById('questionInput').addEventListener('input', function() {
  document.getElementById('sendBtn').disabled = !this.value.trim();
});

// ─── New Chat ─────────────────────────────────────────────────────────────────
function newChat() {
  SESSION_ID = generateId();
  localStorage.setItem('rag_session', SESSION_ID);
  document.getElementById('sessionBadge').textContent = 'session: ' + SESSION_ID.slice(0,8);
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div class="welcome" id="welcome">
    <div class="welcome-logo">Nexus RAG</div>
    <div class="welcome-sub">Upload business documents and ask natural-language questions. Every answer cites its source.</div>
    <div class="suggestion-grid">
      <button class="suggestion" onclick="useSuggestion(this)">What were our Q3 revenue figures?</button>
      <button class="suggestion" onclick="useSuggestion(this)">Summarise the employee leave policy</button>
      <button class="suggestion" onclick="useSuggestion(this)">Which products had the highest margin?</button>
      <button class="suggestion" onclick="useSuggestion(this)">List the key findings from the report</button>
    </div>
  </div>`;
}

// ─── File Upload ──────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});

async function handleFiles(files) {
  for (const file of files) {
    await uploadFile(file);
  }
  loadDocuments();
}

async function uploadFile(file) {
  const statusDiv = document.getElementById('uploadStatus');
  const progId = 'prog_' + Date.now();
  statusDiv.innerHTML = `<div class="upload-progress" id="${progId}">
    <div style="font-size:11px;color:var(--text2)">${escapeHtml(file.name)}</div>
    <div class="progress-bar-bg"><div class="progress-bar" style="width:60%"></div></div>
  </div>`;

  const form = new FormData();
  form.append('file', file);
  try {
    const r = await fetch(`${API}/ingest`, { method: 'POST', body: form });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    toast(`✓ Indexed ${data.chunk_count} chunks from ${file.name}`);
  } catch(e) {
    toast('Upload failed: ' + e.message, true);
  } finally {
    document.getElementById(progId)?.remove();
  }
}

// ─── Load Documents ────────────────────────────────────────────────────────────
async function loadDocuments() {
  try {
    const r = await fetch(`${API}/documents`);
    const data = await r.json();
    documents = data.documents || [];
    renderDocs();
  } catch(e) {}
}

function renderDocs() {
  const list = document.getElementById('docList');
  if (!documents.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:8px 10px">No documents indexed yet</div>';
    return;
  }
  const icons = {pdf:'📄', xlsx:'📊', xls:'📊', csv:'📋', txt:'📝', md:'📝', docx:'📑'};
  list.innerHTML = documents.map(d => {
    const ext = d.filename.split('.').pop().toLowerCase();
    const icon = icons[ext] || '📄';
    return `<div class="doc-item">
      <span class="doc-icon">${icon}</span>
      <span class="doc-name" title="${escapeHtml(d.filename)}">${escapeHtml(d.filename)}</span>
      <span class="doc-chunks">${d.chunk_count}c</span>
      <span class="doc-del" onclick="deleteDoc('${d.doc_id}', event)">✕</span>
    </div>`;
  }).join('');
}

async function deleteDoc(docId, e) {
  e.stopPropagation();
  await fetch(`${API}/documents/${docId}`, { method: 'DELETE' });
  loadDocuments();
}

// ─── Send Message ─────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function useSuggestion(btn) {
  document.getElementById('questionInput').value = btn.textContent;
  document.getElementById('sendBtn').disabled = false;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('questionInput');
  const question = input.value.trim();
  if (!question || isLoading) return;

  // Remove welcome screen
  document.getElementById('welcome')?.remove();

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isLoading = true;

  // Append user bubble
  appendMsg('user', question);

  // Show typing
  const typingId = 'typing_' + Date.now();
  appendTyping(typingId);

  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID, question, top_k: 5 }),
    });

    document.getElementById(typingId)?.remove();

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || r.statusText);
    }

    const data = await r.json();
    appendAIMsg(data);
    loadMetrics();
  } catch(e) {
    document.getElementById(typingId)?.remove();
    appendMsg('error', '⚠ ' + e.message);
  }

  isLoading = false;
}

// ─── Render Messages ──────────────────────────────────────────────────────────
function appendMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');

  if (role === 'user') {
    div.className = 'msg user';
    div.innerHTML = `
      <div class="avatar user">U</div>
      <div class="bubble">
        <div class="bubble-user">${escapeHtml(text)}</div>
      </div>`;
  } else {
    div.className = 'msg';
    div.innerHTML = `
      <div class="avatar ai">N</div>
      <div class="bubble">
        <div class="bubble-ai" style="color:var(--red);font-size:13px">${escapeHtml(text)}</div>
      </div>`;
  }
  msgs.appendChild(div);
  scrollBottom();
}

function appendAIMsg(data) {
  const msgs = document.getElementById('messages');
  const msgId = data.message_id;

  const citationsHtml = data.citations.length ? `
    <div class="citations">
      <div class="citations-header">Sources (${data.citations.length})</div>
      ${data.citations.map(c => `
        <div class="citation" id="cit_${c.source_num}_${msgId}" onclick="toggleCitation(this)">
          <div class="citation-top">
            <div class="citation-num">${c.source_num}</div>
            <div class="citation-file">${escapeHtml(c.filename)}</div>
            <div class="citation-loc">${c.page ? 'p.'+c.page : c.sheet||''}</div>
            <div class="citation-score">${(c.relevance_score*100).toFixed(0)}%</div>
          </div>
          <div class="citation-excerpt">${escapeHtml(c.excerpt)}</div>
        </div>
      `).join('')}
    </div>` : '';

  const div = document.createElement('div');
  div.className = 'msg';
  div.dataset.msgId = msgId;
  div.innerHTML = `
    <div class="avatar ai">N</div>
    <div class="bubble">
      <div class="bubble-ai">
        <div class="ai-text">${formatAnswer(data.answer)}</div>
        ${citationsHtml}
        <div class="msg-footer">
          <button class="feedback-btn" id="up_${msgId}" onclick="submitFeedback('${msgId}',1,this)">
            👍 Helpful
          </button>
          <button class="feedback-btn" id="dn_${msgId}" onclick="submitFeedback('${msgId}',-1,this)">
            👎 Not helpful
          </button>
          <span class="latency">${data.latency_ms}ms · ${data.tokens_used} tokens</span>
        </div>
      </div>
    </div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function appendTyping(id) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = id;
  div.innerHTML = `
    <div class="avatar ai">N</div>
    <div class="bubble">
      <div class="bubble-ai">
        <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function formatAnswer(text) {
  // Convert markdown-lite to HTML
  text = escapeHtml(text);
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\[Source (\d+)\]/g, '<span style="background:var(--accent-glow);color:var(--accent);padding:1px 5px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--font-mono)">[S$1]</span>');
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/\n/g, '<br/>');
  return '<p>' + text + '</p>';
}

function toggleCitation(el) {
  el.classList.toggle('expanded');
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── Feedback ─────────────────────────────────────────────────────────────────
async function submitFeedback(msgId, rating, btn) {
  if (feedbackState[msgId]) return; // already rated
  feedbackState[msgId] = rating;

  document.getElementById('up_'+msgId)?.classList.toggle('active-up', rating===1);
  document.getElementById('dn_'+msgId)?.classList.toggle('active-down', rating===-1);

  await fetch(`${API}/feedback`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ session_id: SESSION_ID, message_id: msgId, rating }),
  }).catch(() => {});

  toast(rating === 1 ? 'Thanks for the positive feedback!' : 'Feedback recorded — we\'ll improve.');
  loadMetrics();
}

// ─── Metrics ──────────────────────────────────────────────────────────────────
async function loadMetrics() {
  try {
    const r = await fetch(`${API}/metrics`);
    const m = await r.json();
    document.getElementById('m-queries').textContent = m.total_queries;
    document.getElementById('m-thumbsup').textContent =
      m.feedback.total ? Math.round(m.feedback.thumbs_up/m.feedback.total*100)+'%' : '—';
    document.getElementById('m-latency').textContent =
      m.avg_latency_ms ? Math.round(m.avg_latency_ms) : '—';
  } catch(e) {}
}

// ─── Clear History ────────────────────────────────────────────────────────────
async function clearHistory() {
  await fetch(`${API}/history/${SESSION_ID}`, { method: 'DELETE' }).catch(() => {});
  newChat();
  toast('Conversation cleared');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, error = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast' + (error ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 3000);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadDocuments();
loadMetrics();
setInterval(loadMetrics, 30000);
</script>
</body>
</html>
