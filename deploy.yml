name: Deploy Nexus RAG to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: nexus-rag-rg
  ACR_NAME: yourregistry            # change to your ACR name
  BACKEND_APP: nexus-rag-backend
  FRONTEND_APP: nexus-rag-frontend

jobs:
  # ── Build & Push ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push backend
        run: |
          docker build -f Dockerfile -t ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-backend:${{ github.sha }} ./backend
          docker push ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-backend:${{ github.sha }}
          docker tag ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-backend:${{ github.sha }} \
                     ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-backend:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-backend:latest

      - name: Build & push frontend
        run: |
          docker build -f frontend/Dockerfile.nginx -t ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-frontend:latest ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/nexus-rag-frontend:latest

  # ── Deploy Infra ─────────────────────────────────────────────
  infra:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters appName=nexus-rag

  # ── Smoke Test ────────────────────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get backend URL
        id: url
        run: |
          URL=$(az containerapp show \
            -g ${{ env.AZURE_RESOURCE_GROUP }} \
            -n ${{ env.BACKEND_APP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          curl -f ${{ steps.url.outputs.url }}/health || exit 1
          echo "✓ Backend healthy"
